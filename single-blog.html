<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Detail - Daw Thin Yanant</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    
    <style>
        /* Theme Colors */
        :root { 
            --primary-purple: #6f42c1; 
            --dark-purple: #4b2354;
            --light-bg: #f8f9fa;
        }
        body { font-family: 'Georgia', 'Pyidaungsu', serif; background-color: var(--light-bg); line-height: 1.8; }
        
        /* 1. Navbar (Top Bar) ပြင်ဆင်ချက် */
        .navbar { background: white; border-bottom: 4px solid var(--primary-purple); padding: 15px 0; }
        .navbar-brand { font-weight: 800; color: var(--dark-purple) !important; font-size: 1.5rem; letter-spacing: 0.5px; }
        .nav-link { color: var(--dark-purple) !important; font-weight: 700; font-size: 15px; margin: 0 10px; transition: 0.3s; }
        .nav-link:hover { color: var(--primary-purple) !important; }

        /* 2. Article Header */
        .article-header { padding: 40px 0; background: #fff; margin-bottom: 30px; border-bottom: 1px solid #ddd; }
        .entry-meta { color: #777; font-size: 0.95rem; font-weight: 600; }
        .entry-meta i { color: var(--primary-purple); margin-right: 5px; }
        .featured-image { width: 100%; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-height: 450px; object-fit: cover; }
        
        /* 3. Content Area */
        .content-area { font-size: 1.1rem; color: #333; text-align: justify; line-height: 2; }
        .content-area blockquote {
            border-left: 5px solid var(--primary-purple);
            padding: 15px 25px;
            background: #f3f0ff;
            font-style: italic;
            margin: 30px 0;
            border-radius: 0 10px 10px 0;
            color: var(--dark-purple);
            font-weight: 600;
        }

        /* 4. Sidebar Widgets */
        .sidebar-widget { background: white; padding: 25px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .widget-title { 
            font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; 
            padding-bottom: 8px; border-bottom: 2px solid var(--primary-purple);
            display: inline-block;
            color: var(--dark-purple);
        }

        .popular-item { padding: 10px; border-radius: 10px; transition: 0.3s; }
        .popular-item:hover { background: #f8f9fa; transform: translateX(5px); }
        .popular-item:hover .rank-number { color: var(--primary-purple) !important; }
        .popular-item:hover h6 { color: var(--primary-purple) !important; }

        .btn-purple { background-color: var(--primary-purple); color: white; border-radius: 8px; padding: 10px; transition: 0.3s; border: none; font-weight: 700; }
        .btn-purple:hover { background-color: var(--dark-purple); color: white; transform: translateY(-2px); }

        .tag-cloud a {
            display: inline-block;
            padding: 6px 15px;
            background: #f3f0ff;
            color: var(--primary-purple);
            text-decoration: none;
            border-radius: 20px;
            margin: 5px;
            font-size: 0.85rem;
            border: 1px solid var(--primary-purple);
            transition: 0.3s;
            font-weight: 600;
        }
        .tag-cloud a:hover { background: var(--primary-purple); color: white; }

        footer { background-color: var(--dark-purple); color: white; padding: 30px 0; margin-top: 50px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">DAW THIN YANANT</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">ပင်မစာမျက်နှာ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="resources.html">အရင်းအမြစ်များ</a>
                    </li>
                    <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                        <a href="blog.html" class="btn btn-outline-primary fw-bold" style="color: var(--primary-purple); border-color: var(--primary-purple); border-radius: 8px;">
                            <i class="fas fa-arrow-left me-1"></i> စာတမ်းများသို့ ပြန်သွားရန်
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="postDetail">
        <div class="text-center py-5" style="min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div class="spinner-border text-primary" role="status" style="color: var(--primary-purple) !important; width: 3rem; height: 3rem;"></div>
            <h5 class="mt-3 text-muted fw-bold">ဆောင်းပါးကို ဖတ်ရှုရန် ပြင်ဆင်နေပါသည်...</h5>
        </div>
    </div>

    <footer>
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 Daw Thin Yanant. Professional Academic Portfolio. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/posts-handler.js"></script>
    
    <script>
        // UI ပုံစံအတိုင်း Dynamic ရေးသားခြင်း
        function renderSinglePostUI() {
            const container = document.getElementById('postDetail');
            if (!container || !window.myPosts) return;

            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            // ID ကို String အဖြစ် ပြောင်းပြီး ရှာဖွေခြင်း (Error ကင်းစေရန်)
            const post = window.myPosts.find(p => String(p.id) === String(id));

            if (post) {
                document.title = `${post.title} - Daw Thin Yanant`;
                container.innerHTML = `
                    <header class="article-header">
                        <div class="container">
                            <nav aria-label="breadcrumb">
                                <ol class="breadcrumb fw-bold">
                                    <li class="breadcrumb-item"><a href="index.html" style="color: var(--primary-purple); text-decoration:none;">ပင်မ</a></li>
                                    <li class="breadcrumb-item"><a href="blog.html" style="color: var(--primary-purple); text-decoration:none;">${post.category}</a></li>
                                    <li class="breadcrumb-item active text-muted">ဆောင်းပါးအသေးစိတ်</li>
                                </ol>
                            </nav>
                            <h1 class="fw-bold mt-3 mb-4" style="color: var(--dark-purple); line-height: 1.4;">${post.title}</h1>
                            <div class="entry-meta mt-3">
                                <span><i class="far fa-calendar-alt"></i> ${post.date}</span> &nbsp;|&nbsp; 
                                <span><i class="far fa-user"></i> Daw Thin Yanant</span> &nbsp;|&nbsp; 
                                <span><i class="far fa-folder"></i> ${post.category}</span>
                            </div>
                        </div>
                    </header>

                    <div class="container">
                        <div class="row">
                            <div class="col-lg-8">
                                <img src="${post.cover}" class="featured-image" alt="${post.title}">
                                <div class="content-area">
                                    ${post.content}
                                </div>

                                <div class="py-4 border-top border-bottom my-5 d-flex align-items-center">
                                    <span class="me-3 fw-bold" style="color: var(--dark-purple);">Share Article:</span>
                                    <a href="#" class="btn btn-outline-primary btn-sm rounded-circle" style="width: 35px; height: 35px; line-height: 22px;"><i class="fab fa-facebook-f"></i></a>
                                    <a href="#" class="btn btn-outline-info btn-sm rounded-circle mx-2" style="width: 35px; height: 35px; line-height: 22px;"><i class="fab fa-twitter"></i></a>
                                    <a href="#" class="btn btn-outline-danger btn-sm rounded-circle" style="width: 35px; height: 35px; line-height: 22px;"><i class="fab fa-telegram-plane"></i></a>
                                </div>
                            </div>

                            <div class="col-lg-4">
                                <div class="sidebar-widget p-4" style="background-color: #f3f0ff;">
                                    <h5 class="widget-title fw-bold">
                                        <i class="fas fa-paper-plane me-2"></i>သတင်းလွှာရယူရန်
                                    </h5>
                                    <p class="small text-muted fw-bold">နောက်ဆုံးရဆောင်းပါးများနှင့် သတင်းများကို သင့်အီးမေးလ်ထံသို့ ပေးပို့ပေးပါမည်။</p>
                                    <form onsubmit="event.preventDefault(); alert('Subscribed!');" class="mt-3">
                                        <div class="mb-3">
                                            <input type="email" class="form-control border-0 shadow-sm" placeholder="သင့်အီးမေးလ်ရိုက်ထည့်ပါ" style="padding: 12px; border-radius: 8px;" required>
                                        </div>
                                        <button type="submit" class="btn btn-purple w-100 shadow-sm">စာရင်းသွင်းရန်</button>
                                    </form>
                                </div>

                                <div class="sidebar-widget">
                                    <h5 class="widget-title fw-bold"><i class="fas fa-fire me-2"></i>လူကြိုက်အများဆုံး</h5>
                                    <div id="popularPostsContainer" class="mt-3">
                                        </div>
                                </div>

                                <div class="sidebar-widget">
                                    <h5 class="widget-title fw-bold"><i class="fas fa-tags me-2"></i>ဆက်စပ် Tags များ</h5>
                                    <div class="tag-cloud mt-2">
                                        ${post.tags ? post.tags.split(',').map(tag => `<a href="#">${tag.trim()}</a>`).join('') : '<a href="#">နည်းပညာ</a> <a href="#">သုတေသန</a>'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                renderPopularPosts(post.id);
            } else {
                container.innerHTML = `
                    <div class="container py-5 text-center" style="min-height: 50vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                        <i class="ri-error-warning-line" style="font-size: 4rem; color: #dc3545;"></i>
                        <h3 class="mt-3 fw-bold" style="color: var(--dark-purple);">ဆောင်းပါး ရှာမတွေ့ပါ</h3>
                        <p class="text-muted">သင်ရှာဖွေနေသော ဆောင်းပါးမှာ ဖျက်သိမ်းခံရခြင်း သို့မဟုတ် လင့်ခ်မှားယွင်းနေခြင်း ဖြစ်နိုင်ပါသည်။</p>
                        <a href="blog.html" class="btn btn-purple mt-3 px-4 py-2"><i class="fas fa-arrow-left me-2"></i> စာတမ်းများသို့ ပြန်သွားရန်</a>
                    </div>`;
            }
        }

        // Popular Posts များကို ဆွဲထုတ်ပြသသည့် Function
        function renderPopularPosts(currentId) {
            const popContainer = document.getElementById('popularPostsContainer');
            if(!popContainer) return;
            
            // လက်ရှိဖတ်နေသော ဆောင်းပါးမဟုတ်သည့် အခြားဆောင်းပါး (၃) ပုဒ်ကို ရွေးချယ်မည်
            const populars = window.myPosts.filter(p => String(p.id) !== String(currentId)).slice(0, 3);
            
            populars.forEach((p, index) => {
                popContainer.innerHTML += `
                    <a href="single-blog.html?id=${p.id}" class="popular-item d-flex align-items-center mb-3 text-decoration-none">
                        <div class="rank-number me-3" style="font-size: 1.8rem; font-weight: 800; color: #e1e5eb;">0${index + 1}</div>
                        <div>
                            <h6 class="mb-1 fw-bold text-dark" style="font-size: 0.95rem; line-height: 1.4;">${p.title}</h6>
                            <small class="text-muted fw-bold"><i class="far fa-eye me-1"></i> ${p.category}</small>
                        </div>
                    </a>
                `;
            });
        }

        // စာမျက်နှာ အပြည့်အဝ Load ဖြစ်ပြီးမှ JavaScript စတင်အလုပ်လုပ်ရန်
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(renderSinglePostUI, 150);
        });
    </script>
</body>
</html>
